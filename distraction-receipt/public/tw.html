<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daily Receipt - Distraction Co.</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#313030",
                      "surface-tint": "#5f5e5e",
                      "tertiary-fixed-dim": "#cac6c2",
                      "primary-fixed-dim": "#c8c6c6",
                      "error": "#ba1a1a",
                      "secondary-container": "#e0e0dc",
                      "outline-variant": "#c4c7c7",
                      "surface-container-high": "#ebe7e7",
                      "on-error-container": "#93000a",
                      "surface-container-low": "#f7f3f2",
                      "on-primary-container": "#9c9b9b",
                      "secondary-fixed-dim": "#c7c7c3",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-fixed": "#1d1b1a",
                      "tertiary-fixed": "#e7e1de",
                      "on-primary-fixed": "#1b1c1c",
                      "primary-fixed": "#e4e2e1",
                      "on-surface": "#1c1b1b",
                      "background": "#fdf8f8",
                      "secondary-fixed": "#e3e2df",
                      "primary-container": "#333333",
                      "surface-dim": "#ddd9d8",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#fdf8f8",
                      "on-primary-fixed-variant": "#474747",
                      "on-tertiary-container": "#9f9b98",
                      "secondary": "#5e5f5c",
                      "on-surface-variant": "#444748",
                      "surface-variant": "#e5e2e1",
                      "primary": "#1e1e1e",
                      "error-container": "#ffdad6",
                      "surface-container-highest": "#e5e2e1",
                      "on-background": "#1c1b1b",
                      "on-secondary-fixed-variant": "#464744",
                      "on-secondary-container": "#626360",
                      "outline": "#747878",
                      "surface": "#fdf8f8",
                      "inverse-primary": "#c8c6c6",
                      "surface-container": "#f1edec",
                      "on-secondary-fixed": "#1b1c1a",
                      "inverse-on-surface": "#f4f0ef",
                      "tertiary": "#201e1c",
                      "on-tertiary-fixed-variant": "#494644",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "tertiary-container": "#353331"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "element-gap": "16px",
                      "item-padding-y": "6px",
                      "unit": "4px",
                      "receipt-margin": "8px",
                      "container-padding": "12px"
              },
              "fontFamily": {
                      "receipt-data": [
                              "Courier Prime"
                      ],
                      "receipt-header": [
                              "Courier Prime"
                      ],
                      "receipt-body": [
                              "Courier Prime"
                      ],
                      "nav-title": [
                              "Inter"
                      ],
                      "ui-label": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "receipt-data": [
                              "11px",
                              {
                                      "lineHeight": "14px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "400"
                              }
                      ],
                      "receipt-header": [
                              "16px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "700"
                              }
                      ],
                      "receipt-body": [
                              "12px",
                              {
                                      "lineHeight": "18px",
                                      "fontWeight": "400"
                              }
                      ],
                      "nav-title": [
                              "13px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "600"
                              }
                      ],
                      "ui-label": [
                              "11px",
                              {
                                      "lineHeight": "12px",
                                      "fontWeight": "500"
                              }
                      ]
              }
      },
          },
        }
    </script>
<style>
        /* Jagged bottom edge for receipt */
        .receipt-edge {
            position: relative;
            background: #F9F8F4;
        }
        .receipt-edge::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 8px;
            background-image: radial-gradient(circle at 4px 8px, transparent 4px, #F9F8F4 4px);
            background-size: 8px 8px;
            background-repeat: repeat-x;
        }
        /* Dotted leader for receipt items */
        .dotted-leader {
            flex-grow: 1;
            border-bottom: 1px dotted #1c1b1b;
            margin: 0 8px;
            position: relative;
            top: -4px;
        }
        
        /* Glassmorphism utility for the container shell */
        .glass-shell {
            background-color: rgba(229, 226, 225, 0.6); /* surface-variant slightly transparent */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4 antialiased overflow-hidden">
<main class="receipt-edge w-full max-w-[300px] bg-[#F9F8F4] text-on-surface p-container-padding pb-6 shadow-[0_2px_10px_rgba(0,0,0,0.1)] flex flex-col gap-6 font-receipt-body text-receipt-body">
<div class="text-center flex flex-col gap-unit">
<h1 class="font-receipt-header text-receipt-header font-bold uppercase tracking-tight">DISTRACTION CO. LLC</h1>
<p class="text-on-surface-variant">Twój codzienny raport</p>
<p class="font-receipt-data text-receipt-data text-on-surface-variant">07.05.2026 22:00</p>
<div class="w-full border-b border-dashed border-outline-variant my-unit"></div>
</div>
<section class="flex flex-col gap-unit">
<h2 class="font-bold uppercase tracking-wider mb-2">ROZPROSZENIA</h2>
<div class="flex justify-between items-end">
<span>YouTube</span>
<div class="dotted-leader"></div>
<span>1h 23m</span>
</div>
<div class="flex justify-between items-end">
<span>Reddit</span>
<div class="dotted-leader"></div>
<span>34 min</span>
</div>
</section>
</main>
</body></html>
